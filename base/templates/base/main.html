<!DOCTYPE html>
{% load static %}
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>MyChat</title>

  <link rel="stylesheet" href="{% static 'styles\main.css' %}" />
</head>

<body>
  <div class="bg-container">
    <!--      <video loop autoplay>-->
    <!--        <source src="{% static 'images/bg.mp4'%}" type="video/mp4" />-->
    <!--      </video>-->
    <img id="bg-gif" src="{% static 'images/bg-gif.gif'%}">
  </div>

  <header
    style="position: absolute; top: 20px; right: 20px; z-index: 9999; background-color: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 8px;">
    <a href="{% url 'lobby' %}"
      style="color: white; margin-right: 15px; text-decoration: none; font-family: 'Wallpoet', cursive;">Home</a>
    <a href="{% url 'about' %}"
      style="color: white; margin-right: 15px; text-decoration: none; font-family: 'Wallpoet', cursive;">About</a>
    <a href="{% url 'contact' %}"
      style="color: white; margin-right: 15px; text-decoration: none; font-family: 'Wallpoet', cursive;">Contact</a>
    {% if user.is_authenticated %}
    <a href="{% url 'logout' %}"
      style="color: rgba(255, 80, 80, 1); text-decoration: none; font-family: 'Wallpoet', cursive;">Logout</a>
    {% else %}
    <a href="{% url 'login' %}"
      style="color: greenyellow; text-decoration: none; font-family: 'Wallpoet', cursive;">Login</a>
    {% endif %}
  </header>

  {% block content%} {% endblock content%}
</body>

</html>
