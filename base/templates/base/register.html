{% extends 'base/main.html' %}
{% load static %}

{% block content %}
<main>
    <section id="form-container">
        <img id="logo" src="{% static 'images/chat-icon.png' %}" />
        <div id="welcome-message">
            <h1>Create Account</h1>
            <p>Join MyChat today</p>
        </div>

        <form id="form" method="POST" action="">
            {% csrf_token %}
            {% if messages %}
            <ul class="messages">
                {% for message in messages %}
                <li style="color:red; font-family:'Wallpoet', cursive;">{{ message }}</li>
                {% endfor %}
            </ul>
            {% endif %}
            <div class="form-field">
                <input type="text" name="username" placeholder="Username" required />
            </div>
            <div class="form-field">
                <input type="password" name="password" placeholder="Password" required />
            </div>
            <div class="form-field">
                <input type="password" name="confirm_password" placeholder="Confirm Password" required />
            </div>

            <div class="form-field">
                <input type="submit" value="Register" class="button-49" />
            </div>
        </form>

        <div style="text-align:center; margin-top: 20px;">
            <p style="color:white; font-family:'Wallpoet', cursive;">Already have an account? <a
                    href="{% url 'login' %}" style="color:greenyellow;">Log In</a></p>
        </div>
    </section>
</main>
{% endblock content %}
